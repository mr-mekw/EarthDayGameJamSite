<!DOCTYPE html>
<html>
<head>
  <title>Mr Mekw EDGJ Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="Style.css">

  <style>
    /* ID'S */
    #Roomport {
    /* to do
    container box center
    */
    border:groove 5px green;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    }

    #Sideport {
        float: right;
        border: ridge 5px red;
        display: inline-flexbox;
        align-items: center;
        justify-content: right;
    }

    /* CLASSES */
    .button {
        /* button size, font size, bort */
        border: groove 5px;
    }
    .button:hover {
        border: ridge;
    }

    .open {
        background-color: green;
        color: rgb(241, 241, 241);
    }
    .open:hover {
        background-color: rgb(0, 160, 0);
    }

    .closed {
        background-color: darkred;
        color: rgb(241, 241, 241);
    }
    .closed:hover {
        background-color: rgb(182, 0, 0);
    }
  </style>
</head>

<body>
    <div id="Roomport">
        <!-- make a container that holds the html of the currently selected room
         i.e. room html runs inside of game.html -->
         <iframe id="currentRoom" width="1200" height="900" src="game/Entrance.html"></iframe>
         <!-- width="1300" height="975"  fits my screen better, but I don't want to use such a funky size -->
          <p id="console">Game Console: any updates will appear here</p>
    </div>
    
    <div id="Sideport">
        <aside><!-- map & key info -->
            <button id="Ent_button" class="open">Entrance</button>
            <br /><button id="LRD_button" class="closed">Living Room</button>
            <br /><button id="HW_button" class="open">Hallway</button>
            <br /><button id="BR_button" class="closed">Bathroom</button>
            <br /><button id="Bed_button" class="closed">Bedroom</button>
        </aside>
    </div>


    <script>
        var _currentroom = document.getElementById("Ent_button");


        document.getElementById("Ent_button").addEventListener('click', function() {
            if (this.className=="closed"){
                document.getElementById("console").textContent = "You can't enter this room :/";
            } else {
                if (_currentroom == document.getElementById("Ent_button")){
                    document.getElementById("console").textContent = "You're already here, silly";
                } else {
                    document.getElementById("currentRoom").src="game/Entrance.html";
                    _currentroom = document.getElementById("Ent_button");
                }
            }
            
        });
