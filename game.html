<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* ID'S */
    #Roomport {
    /* to do
    container box center
    */
    border:groove 5px green;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    }

    #Sideport {
        float: right;
        border: ridge 5px red;

        align-items: center;
        justify-content: right;
    }

    #condiv {
        float: inline-end;
        border:groove 5px green;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    #console {
        text-align: left;
    }

    /* CLASSES */
    .button {
        /* button size, font size, bort */
        border: groove 5px;
    }
    .button:hover {
        border: ridge;
    }

    .open {
        background-color: green;
        color: rgb(241, 241, 241);
    }
    .open:hover {

    }

    .closed {
        background-color: darkred;

    }
    .closed:hover {
        background-color: rgb(182, 0, 0);
    }

    .buttonContainer {
        float: left;
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        
    }
    
    .out {
        visibility: hidden;
        border: groove, black;

</head>

    <div id="condiv">
